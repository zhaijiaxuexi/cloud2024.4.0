server:
  port: 2002

spring:
  application:
    name: seata-storage-service # 在 Nacos 中显示的服务名

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/seata_storage?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 # Nacos 的地址
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: localhost:8858 # Sentinel控制台地址
        port: 8719 # 默认8719，假如被占用会自动从8719+1依次扫描


feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 3000

  httpclient:
    hc5:
      enabled: true # 开启 HttpClient5 支持
  sentinel:
    enabled: true # 开启 Feign 对 Sentinel 的支持

logging:
  level:
    # 格式：接口的全类名: DEBUG
    # 比如你的 Feign 接口在 com.abc.service 包下
    com.itguigu.cloud.api.PayFeignApi: debug

    io:
      seata: info





# ======================== Seata 1.5.2 核心配置 ========================
seata:
  enabled: true
  application-id: ${spring.application.name}

  # 1. 事务分组名（关键点：就像是给你的事务起个频道号）
  tx-service-group: default_tx_group

  service:
    vgroup-mapping:
      # 这里的名字必须和上面 tx-service-group 的值一模一样
      # 映射的值 "default" 必须和 Seata-Server(Docker) 里的集群名一致
      default_tx_group: default

  registry:
    # 指定去哪里找 Seata 服务端
    type: nacos
    nacos:
      application: seata-server # 这个名字要和 Nacos 列表里出现的 Seata 名字对上
      server-addr: localhost:8848
      group: DEFAULT_GROUP
      namespace: "" # 留空代表使用 Nacos 的 public 命名空间

