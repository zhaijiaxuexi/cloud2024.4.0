

spring:
  cloud:
    gateway:
      routes:

        - id: payment_test_fileter
          uri: lb://cloud-payment-service
          predicates:
            - Path=/pays/gateway/filter/**
          filters:
            - AddRequestHeader=X-Request-atguigu1,111
            - AddRequestHeader=X-Request-atguigu2,222
            - RemoveRequestHeader=X-Request-atguigu2
            - SetRequestHeader=X-Request-atguigu1,111改
            - AddRequestParameter=customerId1,9527001
            - AddRequestParameter=customerId2,9527001
            - RemoveRequestParameter=customerId2
            - RemoveRequestParameter=customerId3 # 这里测试一下删除不存在的参数。
                                            # 这里不会报错，只是删了个寂寞
            - AddResponseHeader=X-Response-atguigu1, BlueResponse # 新增响应头X-Response-atguigu并设置为BlueResponse
            - AddResponseHeader=X-Response-atguigu2, BlueResponse # 新增响应头X-Response-atguigu并设置为BlueResponse
            - SetResponseHeader=Date,2099-11-11 # 设置回应头Date值为2099-11-11
            - RemoveResponseHeader=X-Response-atguigu2 # 将默认自带Content-Type回应属性删除

        - id: payment_id_route
          uri: lb://cloud-payment-service
          predicates:
            - Path=/pays/** #这里的**表示任意
#            - UserLevel=vip
#            - Query=username, \d+

        - id: payment_route # 路由的ID，随便起
          uri: lb://cloud-payment-service # 目标微服务，lb代表开启负载均衡
          predicates:
            - Path=/pays # 断言：路径匹配才转发

          filters:
            - AddRequestHeader=X-Request-Foo, Bar # 过滤器：转发前在请求头里加东西


    nacos:
      discovery:
        server-addr: localhost:8848 # Nacos 的地址

    sentinel:
      transport:
        dashboard: localhost:8858 # 你的控制台地址
        port: 8719

      datasource:
        # 名字随便起，代表网关流控
        gw-flow:
          nacos:
            server-addr: localhost:8848
            dataId: ${spring.application.name}-flow-rules # 建议：cloud-gateway-flow-rules
            groupId: SENTINEL_GROUP
            data-type: json
            # 【注意】：这里必须写 gw-flow，代表网关专用流控规则
            rule-type: gw-flow

        gw-api:
          nacos:
            server-addr: localhost:8848
            dataId: ${spring.application.name}-api-groups # 重点：新的 Data ID
            groupId: SENTINEL_GROUP
            rule-type: gw-api-group # 重点：类型必须是这个

  application:
    name: cloud-gateway

server:
  port: 9527